# air.toml 配置文件
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
# 你的项目入口文件（main.go 的路径，根据你的结构调整）
args_bin = []
bin = "./tmp/main"
# 编译命令：-o 指定输出到 tmp 目录，避免覆盖源码
cmd = "go build -o ./tmp/main ./main.go"
# 监控的文件后缀
delay = 1000
exclude_dir = ["assets", "tmp", "vendor", "node_modules"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html"]
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = true

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = false

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
